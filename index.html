<!DOCTYPE html>
<html>
<head>
<title>Marshall Enes</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background-image:url("arkaplan.jpg");
background-size:cover;
background-position:center;
}

/* profil */

.profile{
width:170px;
border-radius:50%;
margin-top:40px;
}

/* orta alan */

.middle{
display:flex;
justify-content:space-between;
align-items:center;
margin:80px;
}

.leftimg{
width:320px;
}

.rightimg{
width:320px;
}

/* plak sistemi */

.plakcontainer{
position:fixed;
top:30px;
right:30px;
width:160px;
height:160px;
}

.plak{
width:160px;
position:absolute;
animation:spin 4s linear infinite;
}

.plakresim{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
border-radius:50%;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* linkler */

a{
display:block;
margin:10px;
font-size:18px;
color:cyan;
text-decoration:none;
}

/* blog */

.blog{
margin-top:30px;
}

</style>

</head>

<body>

<!-- müzik -->

<audio autoplay loop>
<source src="muzik.mp3">
</audio>

<!-- plak -->

<div class="plakcontainer">

<img class="plak" src="plak.png">

<img class="plakresim" src="plakresim.jpg">

</div>

<!-- profil -->

<img class="profile" src="profil.jpg">

<h1>Marshall Enes</h1>

<!-- orta alan -->

<div class="middle">

<img class="leftimg" src="araba.jpg">

<div>

<h2>Sosyal Medya</h2>

<a href="#">Instagram</a>
<a href="#">YouTube</a>
<a href="#">Twitter</a>

<div class="blog">

<h2>Blog</h2>
<p>Bugün kendi internet sitemi yaptım.</p>

</div>

</div>

<img class="rightimg" src="resim2.jpg">

</div>

</body>
</html>
